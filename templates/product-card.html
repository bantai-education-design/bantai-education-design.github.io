<article class="$card_class"
         data-name="$name"
         data-summary="$summary"
         data-features="$features_data"
         data-flagship="$is_flagship"
         data-has-trial="$has_trial"
         data-has-booth="$has_booth"
         data-has-vector="$has_vector"
         data-status="$status">
  <a class="catalog-card-hit-area" href="$detail_url" aria-label="$aria_label" onkeydown="if(event.key==='Enter'){this.click();}"></a>
  <div class="catalog-card-media">
$media_html
  </div>
  <div class="catalog-card-body">
$recommend_html
$badges_html
    <h3>$name</h3>
$target_users_html
    <p class="product-desc">$summary</p>
$actions_html
  </div>
</article>
