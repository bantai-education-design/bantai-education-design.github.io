<svg width="960" height="600" viewBox="0 0 960 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">学級座席デザイナーの座席表作成画面イメージ</title>
  <desc id="desc">教卓、色分けされた座席カード、設定パネル、無料公開版が見える学級座席デザイナーの製品一覧カード用画像です。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8EA"/>
      <stop offset="1" stop-color="#F5F9FF"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F2D58B"/>
      <stop offset="1" stop-color="#C88F2E"/>
    </linearGradient>
    <style>
      .sans{font-family:"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif}
      .navy{fill:#122C54}
      .muted{fill:#607086}
    </style>
  </defs>
  <rect width="960" height="600" rx="28" fill="url(#bg)"/>
  <rect x="36" y="32" width="148" height="58" rx="29" fill="url(#gold)"/>
  <text x="110" y="69" text-anchor="middle" class="sans" style="font-size:30px;font-weight:900;fill:white">無料</text>
  <rect x="198" y="32" width="264" height="58" rx="18" fill="white" stroke="#E7D6AE"/>
  <text x="330" y="68" text-anchor="middle" class="sans navy" style="font-size:24px;font-weight:900">ライセンス不要</text>
  <rect x="660" y="32" width="264" height="58" rx="18" fill="#FFF7E7" stroke="#E7D6AE"/>
  <text x="792" y="64" text-anchor="middle" class="sans" style="font-size:18px;font-weight:800;fill:#C88F2E">無料公開版 v1.0.0</text>
  <text x="792" y="82" text-anchor="middle" class="sans muted" style="font-size:12px;font-weight:700">Web版 / Windows版</text>

  <text x="48" y="136" class="sans navy" style="font-size:48px;font-weight:900">学級座席デザイナー</text>
  <text x="48" y="174" class="sans" style="font-size:22px;font-weight:800;fill:#C88F2E">担任の判断を助ける、半自動の座席表作成ツール</text>

  <rect x="40" y="212" width="612" height="300" rx="26" fill="white" stroke="#D7E0EC"/>
  <rect x="64" y="234" width="564" height="34" rx="10" fill="#E9D9B2"/>
  <text x="346" y="257" text-anchor="middle" class="sans navy" style="font-size:22px;font-weight:900">教卓</text>

  <g transform="translate(70 292)">
    <g fill="#FFF7D9" stroke="#D9B86A">
      <rect x="0" y="0" width="74" height="50" rx="12"/>
      <rect x="88" y="0" width="74" height="50" rx="12"/>
      <rect x="176" y="0" width="74" height="50" rx="12"/>
      <rect x="264" y="0" width="74" height="50" rx="12"/>
      <rect x="352" y="0" width="74" height="50" rx="12"/>
      <rect x="440" y="0" width="74" height="50" rx="12"/>
    </g>
    <g fill="#F2F7FF" stroke="#99B6E3">
      <rect x="0" y="62" width="74" height="50" rx="12"/>
      <rect x="88" y="62" width="74" height="50" rx="12"/>
      <rect x="176" y="62" width="74" height="50" rx="12"/>
      <rect x="264" y="62" width="74" height="50" rx="12"/>
      <rect x="352" y="62" width="74" height="50" rx="12"/>
      <rect x="440" y="62" width="74" height="50" rx="12"/>
    </g>
    <g fill="#EFFAF3" stroke="#9BC8A9">
      <rect x="0" y="124" width="74" height="50" rx="12"/>
      <rect x="88" y="124" width="74" height="50" rx="12"/>
      <rect x="176" y="124" width="74" height="50" rx="12"/>
      <rect x="264" y="124" width="74" height="50" rx="12"/>
      <rect x="352" y="124" width="74" height="50" rx="12"/>
      <rect x="440" y="124" width="74" height="50" rx="12"/>
    </g>
    <g class="sans navy" style="font-size:15px;font-weight:700">
      <text x="16" y="30">1人席</text><text x="102" y="30">ゆうた</text><text x="189" y="30">りこ</text><text x="274" y="30">そうた</text><text x="364" y="30">あやか</text><text x="452" y="30">けんた</text>
      <text x="13" y="92">2人組席</text><text x="102" y="92">みさき</text><text x="186" y="92">まな</text><text x="278" y="92">ひまり</text><text x="364" y="92">だいき</text><text x="452" y="92">たくみ</text>
      <text x="18" y="154">班席</text><text x="104" y="154">さくら</text><text x="190" y="154">れん</text><text x="278" y="154">こうき</text><text x="366" y="154">みう</text><text x="456" y="154">しん</text>
    </g>
  </g>

  <rect x="682" y="212" width="238" height="300" rx="26" fill="#10233F"/>
  <text x="706" y="246" class="sans" style="font-size:26px;font-weight:900;fill:white">設定パネル</text>
  <g class="sans" style="font-size:20px;font-weight:800">
    <rect x="706" y="272" width="190" height="42" rx="12" fill="white"/><text x="728" y="300" fill="#122C54">1人席</text>
    <rect x="706" y="324" width="190" height="42" rx="12" fill="white"/><text x="728" y="352" fill="#122C54">2人組席</text>
    <rect x="706" y="376" width="190" height="42" rx="12" fill="white"/><text x="728" y="404" fill="#122C54">班席</text>
    <rect x="706" y="430" width="190" height="48" rx="12" fill="url(#gold)"/><text x="801" y="460" text-anchor="middle" fill="#10233F">自動配置</text>
  </g>
  <g class="sans" style="font-size:18px;font-weight:800">
    <rect x="706" y="490" width="56" height="18" rx="9" fill="#D7E6F7"/><text x="780" y="505" fill="#DAE4F2">CSV</text>
    <text x="706" y="540" fill="#FFFFFF">印刷</text>
    <text x="782" y="540" fill="#FFFFFF">JSON</text>
  </g>

  <rect x="40" y="532" width="280" height="44" rx="18" fill="white" stroke="#E7D6AE"/>
  <text x="180" y="560" text-anchor="middle" class="sans navy" style="font-size:22px;font-weight:900">教師用 / 掲示用 を切替</text>
</svg>
