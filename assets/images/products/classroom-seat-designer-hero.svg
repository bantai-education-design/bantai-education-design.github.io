<svg width="1200" height="780" viewBox="0 0 1200 780" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">学級座席デザイナーの座席表作成画面イメージ</title>
  <desc id="desc">教卓、6列の座席カード、設定パネル、無料公開版、教師用と掲示用の表示を含む学級座席デザイナーの紹介ビジュアルです。</desc>
  <defs>
    <linearGradient id="bg" x1="70" y1="40" x2="1120" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7E7"/>
      <stop offset="0.48" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F9FF"/>
    </linearGradient>
    <linearGradient id="navyPanel" x1="800" y1="150" x2="1080" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17345D"/>
      <stop offset="1" stop-color="#0B1C36"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F2D58B"/>
      <stop offset="1" stop-color="#C88F2E"/>
    </linearGradient>
    <filter id="shadow" x="72" y="96" width="1056" height="594" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0A1830" flood-opacity="0.12"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0A1830" flood-opacity="0.08"/>
    </filter>
    <style>
      .serif{font-family:"Noto Serif JP","Yu Mincho","Hiragino Mincho ProN",serif}
      .sans{font-family:"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif}
      .navy{fill:#122C54}
      .muted{fill:#5E6B7E}
      .goldFill{fill:#C88F2E}
      .goldStroke{stroke:#C88F2E}
      .label{font-size:22px;font-weight:700;letter-spacing:.08em}
      .chip{font-size:24px;font-weight:800}
      .seatName{font-size:15px;font-weight:700}
      .uiSmall{font-size:16px;font-weight:700}
      .uiTiny{font-size:13px;font-weight:500}
    </style>
  </defs>

  <rect width="1200" height="780" rx="34" fill="url(#bg)"/>
  <circle cx="144" cy="122" r="86" fill="#FFF0CA"/>
  <circle cx="1098" cy="106" r="74" fill="#EEF5FF"/>
  <path d="M60 650C148 594 255 605 326 650C379 684 451 692 518 660C603 620 673 600 770 643C860 684 956 692 1042 642C1088 614 1133 612 1170 622V780H60V650Z" fill="#FFF6E3"/>

  <g filter="url(#shadow)">
    <rect x="96" y="114" width="1008" height="516" rx="30" fill="white"/>
  </g>

  <g>
    <rect x="126" y="146" width="694" height="452" rx="24" fill="#FFFDF8" stroke="#E3D7BA"/>
    <rect x="154" y="170" width="638" height="40" rx="10" fill="#E9D9B2"/>
    <text x="473" y="196" text-anchor="middle" class="sans navy chip">教卓</text>

    <text x="156" y="250" class="sans navy" style="font-size:34px;font-weight:900">5年2組</text>
    <text x="294" y="250" class="sans muted" style="font-size:20px;font-weight:700">教師用レイアウト</text>

    <g transform="translate(150 286)">
      <rect x="0" y="0" width="94" height="70" rx="14" fill="#FFF7D9" stroke="#D9B86A"/>
      <text x="47" y="28" text-anchor="middle" class="sans navy seatName">1人席</text>
      <text x="47" y="51" text-anchor="middle" class="sans muted uiTiny">集中しやすい配置</text>
    </g>
    <g transform="translate(260 286)">
      <rect x="0" y="0" width="118" height="70" rx="14" fill="#F2F7FF" stroke="#99B6E3"/>
      <text x="59" y="28" text-anchor="middle" class="sans navy seatName">2人組席</text>
      <text x="59" y="51" text-anchor="middle" class="sans muted uiTiny">対話しやすい配置</text>
    </g>
    <g transform="translate(394 286)">
      <rect x="0" y="0" width="94" height="70" rx="14" fill="#EFFAF3" stroke="#9BC8A9"/>
      <text x="47" y="28" text-anchor="middle" class="sans navy seatName">班席</text>
      <text x="47" y="51" text-anchor="middle" class="sans muted uiTiny">協働学習向け</text>
    </g>
    <g transform="translate(504 286)">
      <rect x="0" y="0" width="124" height="70" rx="14" fill="#FFF4EE" stroke="#E8B090"/>
      <text x="62" y="28" text-anchor="middle" class="sans navy seatName">自動配置</text>
      <text x="62" y="51" text-anchor="middle" class="sans muted uiTiny">先生が最終調整</text>
    </g>

    <g transform="translate(152 382)">
      <rect x="0" y="0" width="512" height="180" rx="22" fill="white" stroke="#D9E1EE"/>
      <g transform="translate(22 20)">
        <rect x="0" y="0" width="468" height="24" rx="8" fill="#F4F7FB"/>
        <text x="12" y="17" class="sans muted uiSmall">座席表プレビュー</text>
        <text x="348" y="17" class="sans muted uiTiny">掲示用 / 教師用 切替</text>
      </g>

      <g transform="translate(24 58)">
        <g fill="#FFF7D9" stroke="#D9B86A">
          <rect x="0" y="0" width="64" height="42" rx="10"/>
          <rect x="76" y="0" width="64" height="42" rx="10"/>
          <rect x="152" y="0" width="64" height="42" rx="10"/>
          <rect x="228" y="0" width="64" height="42" rx="10"/>
          <rect x="304" y="0" width="64" height="42" rx="10"/>
          <rect x="380" y="0" width="64" height="42" rx="10"/>
        </g>
        <g fill="#F2F7FF" stroke="#99B6E3">
          <rect x="0" y="54" width="64" height="42" rx="10"/>
          <rect x="76" y="54" width="64" height="42" rx="10"/>
          <rect x="152" y="54" width="64" height="42" rx="10"/>
          <rect x="228" y="54" width="64" height="42" rx="10"/>
          <rect x="304" y="54" width="64" height="42" rx="10"/>
          <rect x="380" y="54" width="64" height="42" rx="10"/>
        </g>
        <g fill="#EFFAF3" stroke="#9BC8A9">
          <rect x="0" y="108" width="64" height="42" rx="10"/>
          <rect x="76" y="108" width="64" height="42" rx="10"/>
          <rect x="152" y="108" width="64" height="42" rx="10"/>
          <rect x="228" y="108" width="64" height="42" rx="10"/>
          <rect x="304" y="108" width="64" height="42" rx="10"/>
          <rect x="380" y="108" width="64" height="42" rx="10"/>
        </g>

        <g class="sans navy seatName">
          <text x="13" y="24">ゆうた</text><text x="88" y="24">みさき</text><text x="164" y="24">はると</text><text x="242" y="24">さくら</text><text x="316" y="24">けんた</text><text x="395" y="24">あやか</text>
          <text x="13" y="78">そうた</text><text x="88" y="78">りこ</text><text x="168" y="78">だいき</text><text x="241" y="78">ゆい</text><text x="316" y="78">まな</text><text x="395" y="78">こうき</text>
          <text x="13" y="132">れん</text><text x="88" y="132">あおい</text><text x="164" y="132">しん</text><text x="241" y="132">みう</text><text x="318" y="132">たくみ</text><text x="395" y="132">ひまり</text>
        </g>
      </g>
    </g>
  </g>

  <g>
    <rect x="846" y="146" width="224" height="454" rx="28" fill="url(#navyPanel)"/>
    <text x="878" y="192" class="sans" style="font-size:26px;font-weight:900;fill:white">配置設定</text>
    <text x="878" y="224" class="sans" style="font-size:15px;font-weight:500;fill:#C8D3E6">担任の判断を助ける設定パネル</text>

    <g transform="translate(876 254)">
      <rect x="0" y="0" width="164" height="42" rx="12" fill="#FFFFFF"/>
      <text x="20" y="27" class="sans navy uiSmall">1人席</text>
      <circle cx="138" cy="21" r="12" fill="#E7EEF9"/>
      <circle cx="138" cy="21" r="7" fill="#C88F2E"/>
    </g>
    <g transform="translate(876 308)">
      <rect x="0" y="0" width="164" height="42" rx="12" fill="#FFFFFF"/>
      <text x="20" y="27" class="sans navy uiSmall">2人組席</text>
      <circle cx="138" cy="21" r="12" fill="#E7EEF9"/>
      <circle cx="138" cy="21" r="7" fill="#79A8D8"/>
    </g>
    <g transform="translate(876 362)">
      <rect x="0" y="0" width="164" height="42" rx="12" fill="#FFFFFF"/>
      <text x="20" y="27" class="sans navy uiSmall">班席</text>
      <circle cx="138" cy="21" r="12" fill="#E7EEF9"/>
      <circle cx="138" cy="21" r="7" fill="#8BC49B"/>
    </g>
    <g transform="translate(876 428)">
      <rect x="0" y="0" width="164" height="52" rx="14" fill="url(#gold)"/>
      <text x="82" y="32" text-anchor="middle" class="sans" style="font-size:21px;font-weight:900;fill:#10233F">自動配置</text>
    </g>

    <g transform="translate(876 506)">
      <rect x="0" y="0" width="74" height="70" rx="14" fill="#FFFFFF"/>
      <text x="37" y="28" text-anchor="middle" class="sans navy uiSmall">CSV</text>
      <text x="37" y="51" text-anchor="middle" class="sans muted uiTiny">名簿入出力</text>
      <rect x="90" y="0" width="74" height="70" rx="14" fill="#FFFFFF"/>
      <text x="127" y="28" text-anchor="middle" class="sans navy uiSmall">JSON</text>
      <text x="127" y="51" text-anchor="middle" class="sans muted uiTiny">配置保存</text>
    </g>
  </g>

  <g filter="url(#soft)">
    <rect x="104" y="58" width="132" height="62" rx="31" fill="url(#gold)"/>
    <text x="170" y="97" text-anchor="middle" class="sans" style="font-size:32px;font-weight:900;fill:white">無料</text>
  </g>
  <g filter="url(#soft)">
    <rect x="250" y="58" width="286" height="62" rx="20" fill="white" stroke="#E7D6AE"/>
    <text x="393" y="95" text-anchor="middle" class="sans navy" style="font-size:28px;font-weight:900">ライセンス不要</text>
  </g>
  <g filter="url(#soft)">
    <rect x="842" y="62" width="258" height="62" rx="20" fill="#FFF7E7" stroke="#E7D6AE"/>
    <text x="971" y="88" text-anchor="middle" class="sans goldFill" style="font-size:18px;font-weight:800">無料公開版 v1.0.0</text>
    <text x="971" y="108" text-anchor="middle" class="sans muted" style="font-size:13px;font-weight:700">Web版 / Windows版</text>
  </g>

  <g transform="translate(106 658)">
    <rect x="0" y="0" width="212" height="84" rx="22" fill="white" stroke="#E7D6AE"/>
    <text x="26" y="32" class="sans navy" style="font-size:24px;font-weight:900">教師用</text>
    <text x="26" y="58" class="sans muted uiSmall">チェック記入型の印刷に対応</text>
  </g>
  <g transform="translate(340 658)">
    <rect x="0" y="0" width="212" height="84" rx="22" fill="white" stroke="#E7D6AE"/>
    <text x="26" y="32" class="sans navy" style="font-size:24px;font-weight:900">掲示用</text>
    <text x="26" y="58" class="sans muted uiSmall">教室掲示向けの整った表示</text>
  </g>
  <g transform="translate(574 658)">
    <rect x="0" y="0" width="212" height="84" rx="22" fill="white" stroke="#E7D6AE"/>
    <text x="26" y="32" class="sans navy" style="font-size:24px;font-weight:900">印刷対応</text>
    <text x="26" y="58" class="sans muted uiSmall">A4縦1ページの座席表に最適化</text>
  </g>
  <g transform="translate(808 658)">
    <rect x="0" y="0" width="286" height="84" rx="22" fill="white" stroke="#E7D6AE"/>
    <text x="28" y="32" class="sans navy" style="font-size:24px;font-weight:900">教室と児童の配慮を整理</text>
    <text x="28" y="58" class="sans muted uiSmall">前方希望・近づけたい・離したい設定を確認</text>
  </g>
</svg>
